<!DOCTYPE html>
<html>
    <head>
        <title>Exercício 07</title>
        <meta charset="UTF-8">
        <script>
            function somarImparesMultiplosDe3(){
                var numeros = document.getElementById("txtNumeros").value;
                numeros = numeros.split(",");
                var soma = 0;
                for (var i = 0; i < numeros.length; i++){
                    var n = parseInt(numeros[i]);
                    if (n % 2 !== 0 && n % 3 === 0){
                        soma += n;
                    }
                }
                document.write("Soma dos ímpares múltiplos de 3: " + soma);
            }
        </script>
    </head>
    <body>
        Números: <input type="text" id="txtNumeros">
        <input type="button" value="Calcular" onclick="somarImparesMultiplosDe3()">
    </body>
</html>
